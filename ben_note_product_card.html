
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
  .note-card {
    font-family: 'DM Sans', sans-serif;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 20px;
    max-width: 400px;
    margin: 1.5rem auto;
    overflow: hidden;
    position: relative;
  }
  .badge-new {
    position: absolute;
    top: 16px;
    left: 16px;
    background: #1a1a1a;
    color: #f5f0e8;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    z-index: 2;
  }
  .img-area {
    width: 100%;
    height: 260px;
    background: #f0ebe0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .notebook-svg {
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.15));
  }
  .card-body {
    padding: 1.25rem 1.5rem 1.5rem;
  }
  .brand-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-bottom: 6px;
  }
  .product-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--color-text-primary);
    margin: 0 0 8px;
    line-height: 1.25;
  }
  .product-desc {
    font-size: 13px;
    color: var(--color-text-secondary);
    line-height: 1.6;
    margin: 0 0 1rem;
  }
  .divider {
    height: 0.5px;
    background: var(--color-border-tertiary);
    margin: 0 0 1rem;
  }
  .features {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }
  .feat-pill {
    font-size: 12px;
    color: var(--color-text-secondary);
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 20px;
    padding: 4px 12px;
  }
  .price-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .price-block {}
  .price-label {
    font-size: 11px;
    color: var(--color-text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 2px;
  }
  .price-value {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--color-text-primary);
    line-height: 1;
  }
  .price-value span {
    font-size: 16px;
    font-weight: 400;
    vertical-align: super;
    margin-right: 2px;
  }
  .add-btn {
    background: #1a1a1a;
    color: #f5f0e8;
    border: none;
    border-radius: 12px;
    padding: 12px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: opacity 0.15s;
  }
  .add-btn:hover { opacity: 0.85; }
  .rating-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 1rem;
  }
  .stars { color: #d97b2b; font-size: 13px; letter-spacing: 1px; }
  .rating-count { font-size: 12px; color: var(--color-text-secondary); }
</style>

<h2 class="sr-only">Ben notebook product card — $90</h2>

<div class="note-card">
  <div class="badge-new">New arrival</div>
  <div class="img-area">
    <!-- Ben notebook illustration -->
    <svg class="notebook-svg" width="190" height="220" viewBox="0 0 190 220" xmlns="http://www.w3.org/2000/svg">
      <!-- Notebook body -->
      <rect x="30" y="10" width="130" height="170" rx="6" fill="#2c2c2a"/>
      <!-- Spine detail -->
      <rect x="30" y="10" width="18" height="170" rx="4" fill="#1a1a18"/>
      <!-- Binding dots -->
      <circle cx="39" cy="35" r="3" fill="#444"/>
      <circle cx="39" cy="55" r="3" fill="#444"/>
      <circle cx="39" cy="75" r="3" fill="#444"/>
      <circle cx="39" cy="95" r="3" fill="#444"/>
      <circle cx="39" cy="115" r="3" fill="#444"/>
      <circle cx="39" cy="135" r="3" fill="#444"/>
      <circle cx="39" cy="155" r="3" fill="#444"/>
      <!-- Cover texture lines -->
      <rect x="58" y="30" width="84" height="1.5" rx="1" fill="#3d3d3b" opacity="0.6"/>
      <rect x="58" y="40" width="60" height="1.5" rx="1" fill="#3d3d3b" opacity="0.4"/>
      <!-- Ben label area -->
      <rect x="56" y="60" width="90" height="50" rx="4" fill="#f5f0e8"/>
      <!-- BEN text -->
      <text x="101" y="92" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#1a1a1a" text-anchor="middle">BEN</text>
      <!-- Decorative line under text -->
      <line x1="70" y1="98" x2="132" y2="98" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Bottom accent -->
      <rect x="56" y="140" width="30" height="4" rx="2" fill="#d97b2b" opacity="0.8"/>
      <!-- Elastic band -->
      <rect x="141" y="10" width="5" height="170" rx="2" fill="#d97b2b"/>
      <!-- Page edge -->
      <rect x="158" y="16" width="5" height="158" rx="2" fill="#e8e2d4" opacity="0.9"/>
      <rect x="163" y="16" width="3" height="158" rx="1" fill="#ddd7ca" opacity="0.7"/>
      <!-- Shadow under notebook -->
      <ellipse cx="95" cy="195" rx="65" ry="8" fill="#000" opacity="0.1"/>
    </svg>
  </div>
  <div class="card-body">
    <div class="brand-label">Ben Stationery</div>
    <h1 class="product-title">The Ben Notebook</h1>
    <div class="rating-row">
      <span class="stars">★★★★★</span>
      <span class="rating-count">4.9 · 212 reviews</span>
    </div>
    <p class="product-desc">Premium hardcover notebook with 192 ivory-toned dot-grid pages. Lay-flat binding, elastic closure, and ribbon bookmark. Built for daily carry.</p>
    <div class="divider"></div>
    <div class="features">
      <span class="feat-pill">Dot grid</span>
      <span class="feat-pill">192 pages</span>
      <span class="feat-pill">A5 size</span>
      <span class="feat-pill">Hardcover</span>
    </div>
    <div class="price-row">
      <div class="price-block">
        <div class="price-label">Price</div>
        <div class="price-value"><span>$</span>90</div>
      </div>
      <button class="add-btn" onclick="this.textContent='✓ Added!'">
        <i class="ti ti-shopping-bag" aria-hidden="true"></i> Add to cart
      </button>
    </div>
  </div>
</div>
